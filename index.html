<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>KYOTO CITY 3D — 京都駅・東寺・梅小路シミュレーター</title>
<style>
  :root{ --sumi:#16161a; --kin:#d4a843; --shu:#c84b31; --shiro:#f2efe9; }
  *{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{width:100%;height:100%;overflow:hidden;background:#000;
    font-family:"Hiragino Kaku Gothic ProN","Hiragino Sans","Yu Gothic",system-ui,sans-serif;
    touch-action:none;user-select:none;-webkit-user-select:none;}
  #c{position:fixed;inset:0;display:block;}

  #loading{position:fixed;inset:0;background:var(--sumi);z-index:100;
    display:flex;flex-direction:column;align-items:center;justify-content:center;gap:18px;
    transition:opacity .8s ease;}
  #loading.done{opacity:0;pointer-events:none;}
  .load-mark{font-size:12px;letter-spacing:.5em;color:var(--kin);text-indent:.5em;}
  .load-title{font-size:26px;font-weight:700;color:var(--shiro);letter-spacing:.14em;}
  .load-sub{font-size:11px;color:#888;letter-spacing:.2em;text-align:center;line-height:1.8;}
  .load-bar{width:180px;height:2px;background:#333;overflow:hidden;border-radius:2px;}
  .load-bar i{display:block;width:40%;height:100%;background:var(--kin);
    animation:slide 1.1s ease-in-out infinite;}
  @keyframes slide{0%{transform:translateX(-100%)}100%{transform:translateX(450%)}}

  .panel{background:rgba(18,18,22,.72);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);
    border:1px solid rgba(212,168,67,.25);border-radius:14px;color:var(--shiro);}

  #clock{position:fixed;top:max(10px,env(safe-area-inset-top));left:10px;z-index:10;
    padding:9px 13px;min-width:112px;}
  #clock .place{font-size:8.5px;letter-spacing:.22em;color:var(--kin);margin-bottom:2px;}
  #clock .time{font-size:24px;font-weight:700;font-variant-numeric:tabular-nums;line-height:1.1;}
  #clock .phase{font-size:10px;color:#bbb;margin-top:2px;}

  #views{position:fixed;top:max(10px,env(safe-area-inset-top));right:10px;z-index:10;
    display:grid;grid-template-columns:1fr 1fr;gap:5px;max-width:196px;}
  #views button{padding:8px 9px;font-size:10.5px;letter-spacing:.04em;cursor:pointer;
    background:rgba(18,18,22,.72);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);
    border:1px solid rgba(212,168,67,.25);border-radius:10px;color:var(--shiro);white-space:nowrap;}
  #views button:active{background:rgba(212,168,67,.3);}

  #ctrl{position:fixed;left:50%;transform:translateX(-50%);
    bottom:max(12px,env(safe-area-inset-bottom));z-index:10;
    width:min(500px,calc(100% - 20px));padding:10px 14px 11px;}
  #ctrl .row{display:flex;align-items:center;gap:8px;}
  #playBtn{width:38px;height:38px;border-radius:50%;border:1px solid var(--kin);
    background:rgba(212,168,67,.15);color:var(--kin);font-size:15px;cursor:pointer;flex:none;}
  .spd{flex:none;padding:7px 9px;border-radius:8px;border:1px solid rgba(255,255,255,.18);
    background:transparent;color:#ccc;font-size:10px;cursor:pointer;letter-spacing:.04em;}
  .spd.on{border-color:var(--kin);color:var(--kin);background:rgba(212,168,67,.12);}
  #timeSlider{flex:1;appearance:none;-webkit-appearance:none;height:4px;border-radius:4px;
    background:linear-gradient(90deg,#1b2340 0%,#0e1430 18%,#e8a13b 27%,#bfe3ff 40%,
      #cfe8ff 60%,#f0903b 76%,#21294f 85%,#10142e 100%);outline:none;margin:0 2px;}
  #timeSlider::-webkit-slider-thumb{appearance:none;-webkit-appearance:none;width:18px;height:18px;
    border-radius:50%;background:var(--shiro);border:3px solid var(--kin);cursor:pointer;}
  #ctrl .hint{margin-top:6px;font-size:9px;color:#9a9a9a;text-align:center;letter-spacing:.06em;}

  #joy{position:fixed;left:14px;bottom:calc(max(12px,env(safe-area-inset-bottom)) + 106px);
    width:122px;height:122px;border-radius:50%;z-index:12;touch-action:none;
    background:rgba(18,18,22,.40);border:1.5px solid rgba(212,168,67,.4);
    backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);}
  #joy::before{content:'';position:absolute;inset:9px;border-radius:50%;
    border:1px dashed rgba(255,255,255,.16);}
  #joy .dir{position:absolute;color:rgba(255,255,255,.35);font-size:10px;
    left:50%;transform:translateX(-50%);}
  #joyKnob{position:absolute;left:50%;top:50%;width:54px;height:54px;border-radius:50%;
    transform:translate(-50%,-50%);
    background:radial-gradient(circle at 35% 30%,rgba(244,239,233,.95),rgba(212,168,67,.85));
    border:2px solid rgba(255,255,255,.55);box-shadow:0 3px 10px rgba(0,0,0,.45);
    transition:transform .08s linear;}
  #joy.grab #joyKnob{transition:none;}

  #modeBox{position:fixed;right:12px;bottom:calc(max(12px,env(safe-area-inset-bottom)) + 106px);
    z-index:12;display:flex;flex-direction:column;gap:7px;align-items:flex-end;}
  #modeBox button{padding:11px 15px;font-size:12px;font-weight:700;letter-spacing:.05em;
    cursor:pointer;border:1.5px solid var(--kin);border-radius:24px;color:var(--kin);
    background:rgba(18,18,22,.78);backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);
    box-shadow:0 3px 12px rgba(0,0,0,.35);}
  #modeBox button:active{transform:scale(0.96);}
  #modeBox button.on{background:rgba(212,168,67,.9);color:#1a1a1e;}

  #info{position:fixed;left:50%;transform:translateX(-50%) translateY(8px);
    bottom:calc(max(12px,env(safe-area-inset-bottom)) + 242px);z-index:14;
    width:min(430px,calc(100% - 24px));padding:13px 16px;opacity:0;pointer-events:none;
    transition:opacity .3s ease,transform .3s ease;
    box-shadow:0 6px 24px rgba(0,0,0,.45);}
  #info.show{opacity:1;pointer-events:auto;transform:translateX(-50%) translateY(0);}
  #info .name{font-size:16px;font-weight:700;color:var(--kin);letter-spacing:.06em;}
  #info .desc{font-size:11.5px;line-height:1.7;color:#ddd;margin-top:4px;}
  #info .close{position:absolute;top:8px;right:10px;background:none;border:none;
    color:#999;font-size:16px;cursor:pointer;padding:4px;}
</style>
</head>
<body>

<div id="loading">
  <div class="load-mark">KYOTO CITY SIMULATOR</div>
  <div class="load-title">京都 — 御所・東山・東寺</div>
  <div class="load-sub">RADIUS 4KM / FULL DAY CYCLE<br>LOADING GREATER KYOTO…</div>
  <div class="load-bar"><i></i></div>
</div>

<canvas id="c"></canvas>

<div id="clock" class="panel"><div class="place">KYOTO CITY</div><div class="time" id="timeText">12:00</div><div class="phase" id="phaseText">昼</div></div>

<div id="views">
  <button data-view="bird">⛩ 俯瞰</button><button data-view="plaza">🚉 京都駅</button>
  <button data-view="tower">🗼 タワー</button><button data-view="toji">🏯 東寺</button>
  <button data-view="aqua">🐬 水族館</button><button data-view="kamo">🌊 鴨川</button>
  <button data-view="gosho">🏯 御所</button><button data-view="yasaka">⛩ 八坂</button>
  <button data-view="kiyomizu">🛕 清水寺</button>
</div>

<div id="info" class="panel"><button class="close" id="infoClose">✕</button><div class="name" id="infoName"></div><div class="desc" id="infoDesc"></div></div>

<div id="ctrl" class="panel"><div class="row"><button id="playBtn">⏸</button><button class="spd" data-s="60">×60</button><button class="spd on" data-s="600">×600</button><button class="spd" data-s="3600">×3600</button><input type="range" id="timeSlider" min="0" max="24" step="0.01" value="12"></div><div class="hint">ドラッグ回転 ・ ピンチでズーム ・ スティックで移動 ・ タップで接近</div></div>

<div id="joy"><span class="dir" style="top:6px">▲</span><span class="dir" style="bottom:6px">▼</span><div id="joyKnob"></div></div>
<div id="modeBox"><button id="modeBtn">🚶 街を歩く</button><button id="runBtn" style="display:none">🏃 ダッシュ</button></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>

function radialSprite(stops, size){const c=document.createElement('canvas');c.width=128;c.height=128;const x=c.getContext('2d');const g=x.createRadialGradient(64,64,2,64,64,62);for(const s of stops)g.addColorStop(s[0],s[1]);x.fillStyle=g;x.fillRect(0,0,128,128);const t=new THREE.CanvasTexture(c);t.encoding=THREE.sRGBEncoding;const m=new THREE.SpriteMaterial({map:t,transparent:true,blending:THREE.AdditiveBlending,depthWrite:false,fog:false});const sp=new THREE.Sprite(m);sp.scale.set(size,size,1);return sp;}

const moonDisc=radialSprite([[0,'rgba(235,240,255,1)'],[0.2,'rgba(210,222,245,0.9)'],[0.5,'rgba(160,180,220,0.2)'],[1,'rgba(120,140,190,0)']],220);scene.add(moonDisc);

const clouds=[];(function(){const c=document.createElement('canvas');c.width=256;c.height=128;const x=c.getContext('2d');for(let i=0;i<14;i++){const cx=40+Math.random()*176,cy=44+Math.random()*44,r=16+Math.random()*26;const g=x.createRadialGradient(cx,cy,1,cx,cy,r);g.addColorStop(0,'rgba(255,255,255,0.85)');g.addColorStop(1,'rgba(255,255,255,0)');x.fillStyle=g;x.fillRect(0,0,256,128);}const t=new THREE.CanvasTexture(c);for(let i=0;i<10;i++){const m=new THREE.SpriteMaterial({map:t,transparent:true,opacity:0.55,depthWrite:false,fog:false});const s=new THREE.Sprite(m);const sc=420+Math.random()*520;s.scale.set(sc,sc*0.42,1);s.position.set((Math.random()*2-1)*2400,520+Math.random()*420,(Math.random()*2-1)*2400);s.userData.vx=4+Math.random()*5;scene.add(s);clouds.push(s);}})();
const stars=(function(){const g=new THREE.BufferGeometry();const n=1300,pos=new Float32Array(n*3);for(let i=0;i<n;i++){const th=Math.random()*Math.PI*2,ph=Math.random()*Math.PI*0.48;const r=5400;pos[i*3]=r*Math.sin(ph)*Math.cos(th);pos[i*3+1]=r*Math.cos(ph)+60;pos[i*3+2]=r*Math.sin(ph)*Math.sin(th);}g.setAttribute('position',new THREE.BufferAttribute(pos,3));const m=new THREE.PointsMaterial({color:0xeef2ff,size:2.2,transparent:true,opacity:0,sizeAttenuation:false,fog:false});const p=new THREE.Points(g,m);scene.add(p);return p;})();

function tex(c){const t=new THREE.CanvasTexture(c);t.encoding=THREE.sRGBEncoding;t.anisotropy=Math.min(4,renderer.capabilities.getMaxAnisotropy());return t;}
function shade(hex,f){const n=parseInt(hex.slice(1),16);const r=Math.min(255,((n>>16)&255)*f|0),g=Math.min(255,((n>>8)&255)*f|0),b=Math.min(255,(n&255)*f|0);return `rgb(${r},${g},${b})`;}
function facade(opts){const o=Object.assign({cols:8,rows:14,base:'#8d9298',win:'#27313d',litRatio:0.45,frame:'#6c7178',balcony:false},opts);const W=256,H=256;const day=document.createElement('canvas');day.width=W;day.height=H;const ngt=document.createElement('canvas');ngt.width=W;ngt.height=H;const d=day.getContext('2d'),n=ngt.getContext('2d');const bg=d.createLinearGradient(0,0,W,0);bg.addColorStop(0,o.base);bg.addColorStop(0.5,shade(o.base,1.06));bg.addColorStop(1,o.base);d.fillStyle=bg;d.fillRect(0,0,W,H);n.fillStyle='#000';n.fillRect(0,0,W,H);const cw=W/o.cols,ch=H/o.rows;for(let y=0;y<o.rows;y++)for(let x=0;x<o.cols;x++){const px=x*cw+cw*0.15,py=y*ch+ch*0.2,pw=cw*0.7,ph=ch*0.56;const wg=d.createLinearGradient(px,py,px,py+ph);wg.addColorStop(0,shade(o.win,1.7));wg.addColorStop(0.35,o.win);wg.addColorStop(1,shade(o.win,0.7));d.fillStyle=wg;d.fillRect(px,py,pw,ph);d.strokeStyle=o.frame;d.lineWidth=1;d.strokeRect(px,py,pw,ph);if(o.balcony){d.fillStyle=shade(o.base,0.8);d.fillRect(x*cw+2,py+ph,cw-4,3);}if(Math.random()<o.litRatio){const warm=Math.random()<0.78;n.fillStyle=warm?`rgba(255,${195+Math.random()*40|0},${110+Math.random()*50|0},1)`:'rgba(195,225,255,0.95)';n.fillRect(px,py,pw,ph);if(Math.random()<0.3){n.fillStyle='rgba(0,0,0,0.45)';n.fillRect(px+pw*Math.random()*0.5,py,pw*0.3,ph);}}}return {map:tex(day),emissiveMap:tex(ngt)};}
function roadTexture(lanes){const c=document.createElement('canvas');c.width=128;c.height=256;const x=c.getContext('2d');x.fillStyle='#33363b';x.fillRect(0,0,128,256);for(let i=0;i<500;i++){x.fillStyle=`rgba(255,255,255,${Math.random()*0.035})`;x.fillRect(Math.random()*128,Math.random()*256,2,2);}for(let i=0;i<60;i++){x.fillStyle=`rgba(0,0,0,${Math.random()*0.12})`;x.fillRect(Math.random()*128,Math.random()*256,4,4);}x.strokeStyle='#cfd2d6';x.lineWidth=3;x.beginPath();x.moveTo(6,0);x.lineTo(6,256);x.moveTo(122,0);x.lineTo(122,256);x.stroke();for(let l=1;l<lanes;l++){const px=l*128/lanes;if(l===lanes/2){x.setLineDash([]);x.strokeStyle='#e8c14a';}else{x.setLineDash([18,14]);x.strokeStyle='#cfd2d6';}x.beginPath();x.moveTo(px,0);x.lineTo(px,256);x.stroke();}const t=tex(c);t.wrapS=t.wrapT=THREE.RepeatWrapping;return t;}
function crosswalkTexture(){const c=document.createElement('canvas');c.width=128;c.height=64;const x=c.getContext('2d');x.fillStyle='#34373c';x.fillRect(0,0,128,64);x.fillStyle='#e8e8e8';for(let i=0;i<8;i++)x.fillRect(i*16+3,4,9,56);return tex(c);}const cwTex=crosswalkTexture();
function stationGlass(){const W=512,H=256;const day=document.createElement('canvas');day.width=W;day.height=H;const ngt=document.createElement('canvas');ngt.width=W;ngt.height=H;const d=day.getContext('2d'),n=ngt.getContext('2d');const grd=d.createLinearGradient(0,0,0,H);grd.addColorStop(0,'#b3cde4');grd.addColorStop(0.45,'#82a0bd');grd.addColorStop(1,'#4a5c70');d.fillStyle=grd;d.fillRect(0,0,W,H);for(let i=0;i<6;i++){const gx=Math.random()*W;const hg=d.createLinearGradient(gx,0,gx+60,H);hg.addColorStop(0,'rgba(255,255,255,0)');hg.addColorStop(0.5,'rgba(255,255,255,0.10)');hg.addColorStop(1,'rgba(255,255,255,0)');d.fillStyle=hg;d.fillRect(0,0,W,H);}n.fillStyle='#0a0f18';n.fillRect(0,0,W,H);d.strokeStyle='rgba(38,46,58,0.95)';n.strokeStyle='rgba(60,80,110,0.5)';d.lineWidth=2;n.lineWidth=2;for(let x=0;x<=W;x+=16){d.beginPath();d.moveTo(x,0);d.lineTo(x,H);d.stroke();n.beginPath();n.moveTo(x,0);n.lineTo(x,H);n.stroke();}for(let y=0;y<=H;y+=16){d.beginPath();d.moveTo(0,y);d.lineTo(W,y);d.stroke();n.beginPath();n.moveTo(0,y);n.lineTo(W,y);n.stroke();}for(let y=0;y<H;y+=16)for(let x=0;x<W;x+=16){if(Math.random()<0.55){n.fillStyle=`rgba(255,220,150,${0.25+Math.random()*0.55})`;n.fillRect(x+2,y+2,12,12);}}return {map:tex(day),emissiveMap:tex(ngt)};}
function signTexture(text,fg,bg,fs){const c=document.createElement('canvas');c.width=512;c.height=128;const x=c.getContext('2d');x.fillStyle=bg;x.fillRect(0,0,512,128);x.fillStyle=fg;x.font=`bold ${fs||56}px "Hiragino Kaku Gothic ProN",sans-serif`;x.textAlign='center';x.textBaseline='middle';x.fillText(text,256,68);return tex(c);}
function glowSprite(color,size){const s=radialSprite([[0,color],[0.35,color.replace('1)','0.45)')],[1,'rgba(0,0,0,0)']],size);s.material.opacity=0;s.material.fog=true;return s;}

const nightMats=[],nightGlows=[],lampMats=[],waterMats=[];
function nightMat(params,emissiveMap,color){const m=new THREE.MeshPhongMaterial(Object.assign({shininess:18},params));if(emissiveMap){m.emissiveMap=emissiveMap;m.emissive=new THREE.Color(color||0xffffff);m.emissiveIntensity=0;}nightMats.push(m);return m;}
const roofMat=new THREE.MeshLambertMaterial({color:0x55585e});const roofMat2=new THREE.MeshLambertMaterial({color:0x6a6d72});function facadeBoxMats(fmat){return [fmat,fmat,roofMat,roofMat,fmat,fmat];}

const groundTex=(function(){const c=document.createElement('canvas');c.width=512;c.height=512;const x=c.getContext('2d');x.fillStyle='#56585b';x.fillRect(0,0,512,512);for(let i=0;i<260;i++){x.fillStyle=`rgba(${90+Math.random()*40|0},${90+Math.random()*40|0},${88+Math.random()*36|0},0.25)`;x.fillRect(Math.random()*512,Math.random()*512,30+Math.random()*70,24+Math.random()*60);}const t=tex(c);t.wrapS=t.wrapT=THREE.RepeatWrapping;t.repeat.set(9,9);return t;})();
const ground=new THREE.Mesh(new THREE.PlaneGeometry(7600,7600),new THREE.MeshLambertMaterial({map:groundTex}));ground.rotation.x=-Math.PI/2;ground.receiveShadow=true;scene.add(ground);
function blockPlate(x,z,w,d,color){const m=new THREE.Mesh(new THREE.BoxGeometry(w,0.4,d),new THREE.MeshLambertMaterial({color:color||0x6b6e72}));m.position.set(x,0.2,z);m.receiveShadow=true;scene.add(m);return m;}
const W_EXT=1900;function road(x,z,w,len,vertical,lanes){const t=roadTexture(lanes||4);t.repeat.set(1,len/40);const m=new THREE.Mesh(new THREE.PlaneGeometry(w,len),new THREE.MeshLambertMaterial({map:t}));m.rotation.x=-Math.PI/2;if(!vertical)m.rotation.z=Math.PI/2;m.position.set(x,0.45,z);m.receiveShadow=true;scene.add(m);}
road(0,-130,26,W_EXT,true,4);road(0,-65,22,W_EXT,false,4);road(0,150,18,W_EXT,false,2);road(0,-480,20,W_EXT,false,4);road(0,420,20,W_EXT,false,4);road(230,-130,16,W_EXT,true,2);road(-230,-130,16,W_EXT,true,2);road(-450,-130,18,W_EXT,true,2);road(-700,-130,16,W_EXT,true,2);road(520,-130,16,W_EXT,true,2);road(120,-270,10,460,true,2);road(-120,-270,10,460,true,2);

canvas.addEventListener('pointermove',e=>{const p=pointers.get(e.pointerId);if(!p)return;const dx=e.clientX-p.x,dy=e.clientY-p.y;p.x=e.clientX;p.y=e.clientY;if(pointers.size===1){if(downInfo)downInfo.moved+=Math.abs(dx)+Math.abs(dy);if(mode==='orbit'){camTween=null;ctl.theta-=dx*0.0048;ctl.phi-=dy*0.0040;ctl.phi=Math.max(0.08,Math.min(1.5,ctl.phi));const now=performance.now(),mdt=Math.max(8,now-lastMoveT)/1000;lastMoveT=now;ctl.vTheta=Math.max(-3,Math.min(3,(-dx*0.0048)/mdt*0.55));ctl.vPhi=Math.max(-2,Math.min(2,(-dy*0.0040)/mdt*0.55));}else{enterTween=null;player.yaw-=dx*0.0042;player.pitch-=dy*0.0036;player.pitch=Math.max(-1.25,Math.min(1.25,player.pitch));}}else if(pointers.size===2){const[a,b]=[...pointers.values()];const d=Math.hypot(a.x-b.x,a.y-b.y);const mid={x:(a.x+b.x)/2,y:(a.y+b.y)/2};if(pinchDist>0){if(mode==='orbit'){camTween=null;ctl.radius*=pinchDist/d;ctl.radius=Math.max(ctl.minR,Math.min(ctl.maxR,ctl.radius));const panScale=ctl.cRadius*0.0016;_fwd.set(-Math.sin(ctl.cTheta),0,-Math.cos(ctl.cTheta));_right.set(Math.cos(ctl.cTheta),0,-Math.sin(ctl.cTheta));ctl.target.addScaledVector(_right,-(mid.x-pinchMid.x)*panScale);ctl.target.addScaledVector(_fwd,(mid.y-pinchMid.y)*panScale);clampTarget();}else{_fwd.set(-Math.sin(player.yaw),0,-Math.cos(player.yaw));player.pos.addScaledVector(_fwd,(d-pinchDist)*0.06);player.pos.x=Math.max(-2700,Math.min(2700,player.pos.x));player.pos.z=Math.max(-2850,Math.min(1350,player.pos.z));}}pinchDist=d;pinchMid=mid;}});
function pointerEnd(e){pointers.delete(e.pointerId);if(pointers.size<2)pinchDist=0;if(downInfo&&pointers.size===0){const dt=performance.now()-downInfo.t;if(downInfo.moved<10&&dt<420){ctl.vTheta=0;ctl.vPhi=0;handleTap(e.clientX,e.clientY);}if(performance.now()-lastMoveT>90){ctl.vTheta=0;ctl.vPhi=0;}downInfo=null;}}
canvas.addEventListener('pointerup',pointerEnd);canvas.addEventListener('pointercancel',pointerEnd);canvas.addEventListener('wheel',e=>{e.preventDefault();if(mode==='orbit'){camTween=null;ctl.radius*=(1+Math.sign(e.deltaY)*0.1);ctl.radius=Math.max(ctl.minR,Math.min(ctl.maxR,ctl.radius));}else{_fwd.set(-Math.sin(player.yaw),0,-Math.cos(player.yaw));player.pos.addScaledVector(_fwd,-Math.sign(e.deltaY)*5);}},{passive:false});
const joyEl=document.getElementById('joy');const joyKnob=document.getElementById('joyKnob');const joy={id:null,dx:0,dy:0};function joySet(e){const r=joyEl.getBoundingClientRect();const cx=r.left+r.width/2,cy=r.top+r.height/2;let dx=e.clientX-cx,dy=e.clientY-cy;const max=r.width/2-16,len=Math.hypot(dx,dy);if(len>max){dx*=max/len;dy*=max/len;}joyKnob.style.transform=`translate(calc(-50% + ${dx}px),calc(-50% + ${dy}px))`;joy.dx=dx/max;joy.dy=dy/max;}joyEl.addEventListener('pointerdown',e=>{e.stopPropagation();e.preventDefault();joyEl.setPointerCapture(e.pointerId);joyEl.classList.add('grab');joy.id=e.pointerId;joySet(e);});joyEl.addEventListener('pointermove',e=>{if(e.pointerId===joy.id)joySet(e);});function joyEnd(e){if(e.pointerId!==joy.id)return;joy.id=null;joy.dx=0;joy.dy=0;joyEl.classList.remove('grab');joyKnob.style.transform='translate(-50%,-50%)';}joyEl.addEventListener('pointerup',joyEnd);joyEl.addEventListener('pointercancel',joyEnd);
const modeBtn=document.getElementById('modeBtn');const runBtn=document.getElementById('runBtn');const hintEl=document.querySelector('#ctrl .hint');function setMode(m){if(m===mode)return;if(m==='walk'){player.pos.set(ctl.cTarget.x,1.7,ctl.cTarget.z);player.yaw=ctl.cTheta;player.pitch=0;enterTween={t:0,dur:1.2,fromP:camera.position.clone(),fromQ:camera.quaternion.clone()};mode='walk';modeBtn.textContent='🛰 俯瞰に戻る';runBtn.style.display='block';hintEl.textContent='左スティックで歩く ・ 画面ドラッグで見回す ・ ピンチで前進/後退';}else{mode='orbit';ctl.cTarget.copy(player.pos);ctl.cTheta=player.yaw;ctl.cPhi=1.42;ctl.cRadius=8;ctl.target.copy(player.pos);ctl.target.y=15;ctl.theta=player.yaw;ctl.phi=0.88;ctl.radius=260;ctl.vTheta=0;ctl.vPhi=0;camTween=null;modeBtn.textContent='🚶 街を歩く';runBtn.style.display='none';hintEl.textContent='ドラッグ回転 ・ ピンチでズーム ・ スティックで移動 ・ タップで接近';}}
modeBtn.addEventListener('click',()=>setMode(mode==='orbit'?'walk':'orbit'));runBtn.addEventListener('click',()=>{player.run=!player.run;runBtn.textContent=player.run?'🚶 歩く':'🏃 ダッシュ';runBtn.classList.toggle('on',player.run);});
const raycaster=new THREE.Raycaster();const infoPanel=document.getElementById('info');const infoName=document.getElementById('infoName');const infoDesc=document.getElementById('infoDesc');let infoTimer=null;function showInfo(info){infoName.textContent=info.name;infoDesc.textContent=info.desc;infoPanel.classList.add('show');clearTimeout(infoTimer);infoTimer=setTimeout(()=>infoPanel.classList.remove('show'),10000);}document.getElementById('infoClose').addEventListener('click',()=>infoPanel.classList.remove('show'));function flyTo(targetPos,radius){camTween={t:0,dur:1.4,fromT:ctl.cTarget.clone(),toT:targetPos.clone(),fromR:ctl.cRadius,toR:radius,fromP:ctl.cPhi,toP:Math.min(ctl.cPhi,1.15)};}function handleTap(cx,cy){const m=new THREE.Vector2((cx/innerWidth)*2-1,-(cy/innerHeight)*2+1);raycaster.setFromCamera(m,camera);const hits=raycaster.intersectObjects(clickables,true);if(!hits.length)return;let obj=hits[0].object;while(obj&&!obj.userData.info)obj=obj.parent;if(!obj)return;const info=obj.userData.info;if(mode==='walk'){showInfo(info);return;}const box=new THREE.Box3().setFromObject(obj);const center=box.getCenter(new THREE.Vector3());flyTo(center,info.focusRadius);showInfo(info);}
const views={bird:{t:[400,0,-1000],r:2600,phi:0.34},plaza:{t:[0,18,-40],r:120,phi:1.25},tower:{t:[28,75,-150],r:150,phi:1.05},toji:{t:[-565,25,335],r:200,phi:1.0},aqua:{t:[-520,8,-95],r:190,phi:0.95},kamo:{t:[660,4,-400],r:240,phi:1.1},gosho:{t:[140,16,-2380],r:520,phi:0.66},yasaka:{t:[1000,14,-1110],r:230,phi:1.0},kiyomizu:{t:[1370,62,-560],r:250,phi:0.98}};document.querySelectorAll('#views button').forEach(b=>{b.addEventListener('click',()=>{const v=views[b.dataset.view];if(mode==='walk')setMode('orbit');camTween={t:0,dur:1.6,fromT:ctl.cTarget.clone(),toT:new THREE.Vector3(...v.t),fromR:ctl.cRadius,toR:v.r,fromP:ctl.cPhi,toP:v.phi};});});
const playBtn=document.getElementById('playBtn');const slider=document.getElementById('timeSlider');const timeText=document.getElementById('timeText');const phaseText=document.getElementById('phaseText');playBtn.addEventListener('click',()=>{playing=!playing;playBtn.textContent=playing?'⏸':'▶';});document.querySelectorAll('.spd').forEach(b=>{b.addEventListener('click',()=>{document.querySelectorAll('.spd').forEach(x=>x.classList.remove('on'));b.classList.add('on');timeSpeed=parseFloat(b.dataset.s);if(!playing){playing=true;playBtn.textContent='⏸';}});});slider.addEventListener('input',()=>{timeOfDay=parseFloat(slider.value);});function phaseName(h){if(h<4)return'深夜';if(h<6)return'夜明け前';if(h<7)return'日の出';if(h<11)return'朝';if(h<15)return'昼';if(h<17.5)return'午後';if(h<19)return'夕暮れ';if(h<21)return'宵';return'夜';}
const clock=new THREE.Clock();let elapsed=0;function animate(){requestAnimationFrame(animate);const dt=Math.min(clock.getDelta(),0.05);elapsed+=dt;if(playing){timeOfDay=(timeOfDay+dt*timeSpeed/3600)%24;slider.value=timeOfDay;}const hh=Math.floor(timeOfDay),mm=Math.floor((timeOfDay%1)*60);timeText.textContent=`${String(hh).padStart(2,'0')}:${String(mm).padStart(2,'0')}`;phaseText.textContent=phaseName(timeOfDay);updateEnvironment();const traffic=0.35+0.65*(1-nightFactor(timeOfDay)*0.7);updateVehicles(dt*traffic*1.4);updateTrains(dt);updatePeds(dt*traffic,elapsed);for(const c of clouds){c.position.x+=c.userData.vx*dt;if(c.position.x>2600)c.position.x=-2600;}const sh=140+Math.sin(elapsed*1.7)*50;for(const m of waterMats)m.shininess=sh;updateCamera(dt);renderer.render(scene,camera);}
window.addEventListener('resize',()=>{camera.aspect=innerWidth/innerHeight;camera.updateProjectionMatrix();renderer.setSize(innerWidth,innerHeight);});updateEnvironment();updateCamera(0.016);animate();setTimeout(()=>document.getElementById('loading').classList.add('done'),1100);
